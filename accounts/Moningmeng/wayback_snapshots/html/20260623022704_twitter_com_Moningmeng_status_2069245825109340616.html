  昨天我与n55见面，实际接触下来，她是一个很友好，很健谈，也很乐观的人
  <br/>
  <br/>
  因为过去的一些事情，她在网上经常会被贴上各种各样的标签，久而久之，很多人对她的印象似乎也只剩下了那些标签和梗。但真正接触之后会发现，她其实和大多数普通人一样，有自己的想法，也有自己的生活节奏，并不像一些刻板印象里描述的那样
  <br/>
  <br/>
  她对这些刻板印象本身反而看得比较开。面对那些围绕自己的梗，她没有表现出太多抵触，甚至有时候还会主动拿来玩。能够用这样的心态面对外界的评价，我觉得还挺难得的
  <br/>
  <br/>
  很多时候网络上的印象和现实中的人之间，其实还是有不小的距离的。真正认识一个人，往往比听说一个人更有意义
